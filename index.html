<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กำลังโหลด...</title>
    <link id="favicon" rel="icon" href="" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pink: {
                            50: '#fdf2f8',
                            100: '#fce7f3',
                            200: '#fbcfe8',
                            300: '#f9a8d4',
                            400: '#f472b6',
                            500: '#ec4899',
                            600: '#db2777',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #fff0f5; 
            background-image: radial-gradient(#fbcfe8 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .marquee-container { 
            overflow: hidden; white-space: nowrap; width: 100%; 
            background: linear-gradient(90deg, #fce7f3, #fbcfe8, #fce7f3); 
            color: #db2777; padding: 12px 0; font-weight: bold; 
            box-shadow: 0 4px 15px rgba(244, 114, 182, 0.2);
            border-bottom: 2px dashed #f9a8d4;
        }
        .marquee-content { display: inline-block; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        
        .hide { display: none !important; }
        
        /* สกอร์บาร์ */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #f9a8d4; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #f472b6; }

        /* กล่องข้อความที่คงรูปแบบเป๊ะๆ */
        .cute-text-box {
            white-space: pre-wrap; 
            word-wrap: break-word;
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col relative">

    <div class="marquee-container flex items-center">
        <div class="marquee-content ml-4" id="bannerText">ยินดีต้อนรับสู่ร้านของเรา...</div>
    </div>

    <header class="text-center py-12">
        <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-pink-400 mb-3 drop-shadow-sm" id="mainTitle">บริการของเรา</h1>
        <div class="inline-block bg-pink-100 text-pink-500 px-4 py-1 rounded-full text-sm font-bold shadow-sm">by คุณโซ</div>
    </header>

    <main class="flex-grow container mx-auto px-4 pb-20 max-w-6xl">
        <div id="loading" class="text-center text-pink-400 py-10 font-bold flex justify-center items-center gap-2">
            <svg class="animate-spin h-6 w-6" viewBox="0 0 24 24" fill="none">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            กำลังโหลดข้อมูล...
        </div>
        
        <div id="sellersGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-8 hide"></div>
    </main>

    <footer class="mt-auto py-6 text-center text-pink-400 text-sm font-medium bg-white/50 backdrop-blur-sm border-t border-pink-100">
        <button onclick="toggleAdminPanel()" class="hover:text-pink-600 transition-colors flex items-center justify-center w-full gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            ตั้งค่าผู้ดูแลระบบ
        </button>
    </footer>

    <div id="adminModal" class="fixed inset-0 bg-pink-900/40 backdrop-blur-md z-50 flex justify-center items-center hide p-4">
        <div class="bg-white rounded-[2rem] w-full max-w-3xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden border-4 border-pink-200">
            <div class="bg-gradient-to-r from-pink-100 to-pink-50 p-5 flex justify-between items-center border-b border-pink-200">
                <h2 class="text-xl font-bold text-pink-600 flex items-center gap-2">
                    <svg class="w-6 h-6 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path>
                    </svg>
                    หลังบ้านคนสวย
                </h2>
                <button onclick="toggleAdminPanel()" class="bg-white text-pink-400 hover:text-pink-600 hover:bg-pink-100 p-2 rounded-full transition-all shadow-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div id="loginState" class="p-10 text-center flex flex-col items-center justify-center flex-grow">
                <div class="bg-pink-100 p-4 rounded-full mb-4">
                    <svg class="w-10 h-10 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <p class="text-pink-600 mb-6 font-bold text-lg">ใส่รหัสผ่านเพื่อเข้าสู่ระบบ</p>
                <input type="password" id="adminPass" class="w-full max-w-sm border-2 border-pink-200 rounded-2xl px-5 py-3 focus:outline-none focus:border-pink-400 focus:ring-4 focus:ring-pink-100 mb-6 text-center text-lg transition-all shadow-inner" placeholder="••••••">
                <button onclick="checkLoginLocal()" class="bg-gradient-to-r from-pink-400 to-pink-500 hover:from-pink-500 hover:to-pink-600 text-white font-bold py-3 px-10 rounded-2xl transition shadow-lg shadow-pink-200/50 transform hover:scale-105">เข้าสู่ระบบ</button>
            </div>

            <div id="dashboardState" class="p-6 overflow-y-auto flex-grow hide bg-pink-50/50">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-pink-100 mb-6 relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 w-16 h-16 bg-pink-100 rounded-full opacity-50"></div>
                    <h3 class="font-bold text-lg text-pink-600 mb-4 border-b-2 border-pink-50 pb-2 flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                        ตั้งค่าเว็บไซต์
                    </h3>
                    <div class="space-y-4 text-sm relative z-10">
                        <div><label class="block text-gray-600 font-bold mb-1.5">ชื่อเว็บ (Title):</label><input type="text" id="configTitle" class="w-full border-2 border-pink-100 rounded-xl p-3 focus:outline-none focus:border-pink-400 focus:ring-2 focus:ring-pink-50 transition-all bg-gray-50/50"></div>
                        <div><label class="block text-gray-600 font-bold mb-1.5">ไอคอนเว็บ (Favicon URL):</label><input type="text" id="configFavicon" class="w-full border-2 border-pink-100 rounded-xl p-3 focus:outline-none focus:border-pink-400 focus:ring-2 focus:ring-pink-50 transition-all bg-gray-50/50"></div>
                        <div><label class="block text-gray-600 font-bold mb-1.5">ป้ายวิ่งโปรโมท (Banner):</label><input type="text" id="configBanner" class="w-full border-2 border-pink-100 rounded-xl p-3 focus:outline-none focus:border-pink-400 focus:ring-2 focus:ring-pink-50 transition-all bg-gray-50/50"></div>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-3xl shadow-sm border border-pink-100">
                    <div class="flex justify-between items-center mb-4 border-b-2 border-pink-50 pb-3">
                        <h3 class="font-bold text-lg text-pink-600 flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            รายการสินค้าและบริการ
                        </h3>
                        <button onclick="addSellerForm()" class="text-sm bg-gradient-to-r from-pink-400 to-pink-500 text-white hover:from-pink-500 hover:to-pink-600 px-4 py-2 rounded-xl font-bold flex items-center gap-1 shadow-md transform hover:scale-105 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            เพิ่มรายการ
                        </button>
                    </div>
                    <div id="adminSellersList" class="space-y-6"></div>
                </div>
            </div>

            <div id="adminFooter" class="bg-white p-5 border-t border-pink-100 flex justify-between items-center hide rounded-b-[2rem]">
                <span id="saveStatus" class="text-sm font-bold text-pink-500"></span>
                <button onclick="saveData()" class="bg-gradient-to-r from-pink-500 to-pink-600 hover:from-pink-600 hover:to-pink-700 text-white font-bold py-3 px-8 rounded-2xl transition shadow-lg shadow-pink-200 flex items-center gap-2 transform hover:scale-105">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                    บันทึกข้อมูล
                </button>
            </div>
        </div>
    </div>

    <script>
        // นำ URL จาก Google Apps Script มาใส่ตรงนี้
        const API_URL = "https://script.google.com/macros/s/AKfycbwZAm8bJclCdszoGxgBwpmPfJyr3omxWfGdNmFnjEpdjaoPrGcsQ9I8ZKXeTNShNqW7/exec"; 
        
        let appData = { settings: {}, sellers: [] };
        let currentPassword = "";

        window.onload = async () => {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "getData" })
                });
                const result = await res.json();
                
                if (result.success) {
                    appData = result;
                    renderPublicPage();
                } else {
                    document.getElementById('loading').innerHTML = "เกิดข้อผิดพลาดในการโหลดข้อมูล";
                }
            } catch (err) {
                document.getElementById('loading').innerHTML = "ไม่สามารถเชื่อมต่อฐานข้อมูลได้";
                console.error(err);
            }
        };

        function renderPublicPage() {
            document.getElementById('loading').classList.add('hide');
            document.getElementById('sellersGrid').classList.remove('hide');

            document.title = appData.settings.Title || "บริการร้านค้า";
            document.getElementById('mainTitle').innerText = appData.settings.Title || "บริการร้านค้า";
            if (appData.settings.Favicon) {
                document.getElementById('favicon').href = appData.settings.Favicon;
            }
            document.getElementById('bannerText').innerText = appData.settings.Banner || "ยินดีต้อนรับ";

            const grid = document.getElementById('sellersGrid');
            grid.innerHTML = "";
            
            appData.sellers.forEach(seller => {
                const safeServices = seller.services ? seller.services.replace(/</g, "&lt;").replace(/>/g, "&gt;") : "";

                let servicesHTML = safeServices
                    ? `<div class="cute-text-box text-[14px] text-gray-700 leading-relaxed bg-pink-50/70 p-5 rounded-2xl border border-pink-100 shadow-inner overflow-x-auto">${safeServices}</div>`
                    : `<div class="text-pink-300 text-sm italic text-center py-4 bg-pink-50/50 rounded-2xl">ยังไม่มีข้อมูลบริการ</div>`;

                grid.innerHTML += `
                    <div class="bg-white rounded-[2rem] p-6 shadow-xl shadow-pink-100/40 border-[3px] border-white hover:border-pink-100 hover:-translate-y-2 hover:shadow-2xl hover:shadow-pink-200/50 transition-all duration-300 flex flex-col h-full relative group">
                        <div class="absolute -top-6 -right-6 w-24 h-24 bg-gradient-to-br from-pink-100 to-pink-50 rounded-full opacity-50 z-0 group-hover:scale-110 transition-transform duration-500"></div>

                        <div class="flex items-center gap-4 mb-5 border-b-2 border-pink-50 pb-5 relative z-10">
                            <div class="bg-gradient-to-br from-pink-200 to-pink-300 text-white p-3.5 rounded-2xl shadow-md">
                                <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"></path></svg>
                            </div>
                            <div class="flex-grow overflow-hidden">
                                <p class="text-[10px] text-pink-400 font-extrabold uppercase tracking-widest mb-1">Contact</p>
                                <h3 class="text-xl font-extrabold text-gray-800 truncate">${seller.name}</h3>
                            </div>
                            <button onclick="copyName('${seller.name}')" title="คัดลอกชื่อ" class="bg-white border-2 border-pink-100 hover:bg-pink-50 hover:border-pink-300 text-pink-500 p-2.5 rounded-xl transition-all shadow-sm transform hover:scale-105">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                            </button>
                        </div>
                        
                        <div class="flex-grow mb-6 relative z-10">
                            <div class="flex items-center gap-2 mb-3 px-1">
                                <svg class="w-5 h-5 text-pink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                                <p class="text-sm font-bold text-pink-500">รายละเอียดสินค้า & ราคา</p>
                            </div>
                            ${servicesHTML}
                        </div>

                        <a href="${seller.fblink}" target="_blank" class="block w-full text-center bg-gradient-to-r from-pink-400 to-pink-500 hover:from-pink-500 hover:to-pink-600 text-white font-bold py-3.5 rounded-2xl transition-all shadow-lg shadow-pink-200 hover:shadow-pink-400/50 relative z-10 transform hover:scale-[1.02] active:scale-95">
                            ติดต่อสั่งซื้อที่นี่
                        </a>
                    </div>
                `;
            });
        }

        function copyName(name) {
            navigator.clipboard.writeText(name).then(() => {
                alert("คัดลอกชื่อ: " + name + " เรียบร้อยแล้วครับ");
            });
        }

        function extractFBName(inputElement, targetId) {
            let url = inputElement.value;
            let match = url.match(/(?:https?:\/\/)?(?:www\.)?facebook\.com\/(?:profile\.php\?id=)?([a-zA-Z0-9.]+)/i);
            if (match && match[1]) {
                document.getElementById(targetId).value = match[1];
            }
        }

        function toggleAdminPanel() {
            const modal = document.getElementById('adminModal');
            if (modal.classList.contains('hide')) {
                modal.classList.remove('hide');
                document.getElementById('loginState').classList.remove('hide');
                document.getElementById('dashboardState').classList.add('hide');
                document.getElementById('adminFooter').classList.add('hide');
                document.getElementById('adminPass').value = "";
            } else {
                modal.classList.add('hide');
            }
        }

        function checkLoginLocal() {
            const pass = document.getElementById('adminPass').value;
            if (pass.trim() === "") return;
            currentPassword = pass;
            
            document.getElementById('loginState').classList.add('hide');
            document.getElementById('dashboardState').classList.remove('hide');
            document.getElementById('adminFooter').classList.remove('hide');
            
            setupAdminDashboard();
        }

        function setupAdminDashboard() {
            document.getElementById('configTitle').value = appData.settings.Title || "";
            document.getElementById('configFavicon').value = appData.settings.Favicon || "";
            document.getElementById('configBanner').value = appData.settings.Banner || "";

            const list = document.getElementById('adminSellersList');
            list.innerHTML = "";
            appData.sellers.forEach((seller, index) => {
                appendSellerForm(seller.id, seller.name, seller.fblink, seller.services, index);
            });
        }

        function appendSellerForm(id, name, fblink, services, index) {
            const list = document.getElementById('adminSellersList');
            const html = `
                <div class="bg-pink-50/50 p-5 rounded-2xl border-2 border-pink-100 relative seller-item shadow-sm" data-id="${id}">
                    <button onclick="this.parentElement.remove()" class="absolute top-3 right-3 text-pink-300 hover:text-red-500 bg-white p-1.5 rounded-full shadow-sm hover:shadow-md transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                        <div>
                            <label class="block text-xs font-bold text-pink-500 mb-1.5">ลิงก์ Facebook:</label>
                            <input type="text" class="seller-fb w-full border-2 border-white rounded-xl p-2.5 text-sm focus:outline-none focus:border-pink-300 focus:ring-2 focus:ring-pink-100 shadow-sm" value="${fblink}" oninput="extractFBName(this, 'seller-name-${index}')" placeholder="https://facebook.com/username">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-pink-500 mb-1.5">ชื่อแสดงผล:</label>
                            <input type="text" id="seller-name-${index}" class="seller-name w-full border-2 border-white rounded-xl p-2.5 text-sm focus:outline-none focus:border-pink-300 focus:ring-2 focus:ring-pink-100 shadow-sm" value="${name}" placeholder="ชื่อแม่ค้า">
                        </div>
                    </div>
                    <div class="mt-4">
                        <label class="block text-xs font-bold text-pink-500 mb-1.5 flex justify-between">
                            <span>รายการสินค้า (วางข้อความจัดหน้ามาได้เลย!):</span>
                        </label>
                        <textarea class="seller-services w-full border-2 border-white rounded-xl p-3 text-sm focus:outline-none focus:border-pink-300 focus:ring-2 focus:ring-pink-100 shadow-sm font-mono leading-relaxed" rows="10" placeholder="วางข้อความเมนู ราคา แบบเว้นวรรคได้เลย...">${services}</textarea>
                    </div>
                </div>
            `;
            list.insertAdjacentHTML('beforeend', html);
        }

        function addSellerForm() {
            const newIndex = document.querySelectorAll('.seller-item').length + 1;
            appendSellerForm("new_" + Date.now(), "", "", "", newIndex);
        }

        async function saveData() {
            const statusText = document.getElementById('saveStatus');
            statusText.innerText = "กำลังบันทึกข้อมูล...";
            statusText.className = "text-sm font-bold text-yellow-500 animate-pulse";

            const newSettings = {
                Title: document.getElementById('configTitle').value,
                Favicon: document.getElementById('configFavicon').value,
                Banner: document.getElementById('configBanner').value
            };

            const newSellers = [];
            document.querySelectorAll('.seller-item').forEach((item, index) => {
                newSellers.push({
                    id: item.getAttribute('data-id') || index.toString(),
                    name: item.querySelector('.seller-name').value,
                    fblink: item.querySelector('.seller-fb').value,
                    services: item.querySelector('.seller-services').value
                });
            });

            const payload = { settings: newSettings, sellers: newSellers };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "saveData",
                        password: currentPassword,
                        payload: payload
                    })
                });
                const result = await res.json();

                if (result.success) {
                    statusText.innerText = "บันทึกสำเร็จแล้ว!";
                    statusText.className = "text-sm font-bold text-green-500";
                    
                    appData.settings = newSettings;
                    appData.sellers = newSellers;
                    renderPublicPage();
                    
                    setTimeout(() => { toggleAdminPanel(); }, 1500);
                } else {
                    statusText.innerText = "รหัสผ่านผิด หรือเกิดข้อผิดพลาด";
                    statusText.className = "text-sm font-bold text-red-500";
                }
            } catch (err) {
                statusText.innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อ";
                statusText.className = "text-sm font-bold text-red-500";
            }
        }
    </script>
</body>
</html>
